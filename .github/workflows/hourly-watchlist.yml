name: Hourly Watchlist Poll

on:
  schedule:
    # Every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  poll-watchlist:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run hourly workflow
        run: node dist/index.js hourly
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCORE_THRESHOLD: ${{ vars.SCORE_THRESHOLD || '7' }}

      - name: Commit updated state
        run: |
          git config user.name "ai-job-radar[bot]"
          git config user.email "bot@ai-job-radar"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update seen_jobs after hourly run [skip ci]"
          git push
